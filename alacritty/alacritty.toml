[window]
padding = { x = 5, y = 5}
dynamic_padding = true
decorations = "None"      # Full | None
opacity = 0.9
startup_mode = "Windowed" # Windowed | Maximized | Fullscreen
title = "Alacritty"

[font]
normal = { family = "JetBrainsMono Nerd Font", style="Bold Italic"}
size = 13
offset = { x = 0, y = 1}

[cursor]
style = { shape = "Block", blinking = "On" }

[terminal]
shell = { program = "pwsh.exe", args = ["-l"]}
