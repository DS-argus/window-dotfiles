format = """
$directory${custom.giturl}$git_branch${custom.git_worktree}$git_status$python$lua$golang$rust$cmd_duration$character"""

add_newline = true
palette = 'nord'

[directory]
style = 'bold fg:frost1'
format = '[$path]($style) '
truncation_length = 2
truncation_symbol = '…/'
truncate_to_repo = false

[character]
success_symbol = '[ ](bold fg:aurora_green)'
error_symbol = '[✘ ](bold fg:aurora_red)'
vimcmd_symbol = '[: ](bold fg:aurora_yellow)'

[custom.giturl]
description = 'Display symbol for remote Git server'
command = '''
$remote = git ls-remote --get-url 2>$null
switch -Regex ($remote) {
  'github' { [Console]::Out.Write(" "); break }
  'gitlab' { [Console]::Out.Write(" "); break }
  'bitbucket' { [Console]::Out.Write(" "); break }
  'git' { [Console]::Out.Write(" "); break }
  default { [Console]::Out.Write(" "); break }
}
'''
when = 'git rev-parse --is-inside-work-tree *> $null'
format = '[$output](bold fg:frost1) '
require_repo = true
ignore_timeout = true
shell = ['pwsh.exe', '-NoLogo', '-NoProfile', '-Command']

[git_branch]
symbol = ' '
style = 'fg:polar0 bg:frost2 bold'
format = '[](fg:frost2)[$symbol$branch]($style)[](fg:frost2) '

[custom.git_worktree]
description = 'Show indicator when inside a git worktree'
command = '[Console]::Out.Write("⛓")'
when = '''
git rev-parse --is-inside-work-tree *> $null
if ($LASTEXITCODE -ne 0) { exit 1 }

$common = git rev-parse --path-format=absolute --git-common-dir 2>$null
if ($LASTEXITCODE -ne 0) { exit 1 }

$dir = git rev-parse --path-format=absolute --git-dir 2>$null
if ($LASTEXITCODE -ne 0) { exit 1 }

if ($common -ne $dir) { exit 0 }
exit 1
'''
format = '[$output](bold fg:aurora_green) '
require_repo = true
ignore_timeout = true
shell = ['pwsh.exe', '-NoLogo', '-NoProfile', '-Command']

[git_status]
ahead = '[⇡${count}](fg:frost1)'
behind = '[⇣${count}](fg:aurora_orange)'
diverged = '[⇕⇡${ahead_count}⇣${behind_count}](fg:aurora_purple)'
untracked = '[?${count}](fg:aurora_red)'
modified = '[!${count}](fg:aurora_yellow)'
conflicted = '[=${count}](fg:aurora_red)'
staged = '[+${count}](fg:aurora_green)'
stashed = '[*${count}](fg:aurora_purple)'
deleted = '[-${count}](fg:aurora_red)'
renamed = '[»${count}](fg:frost2)'
style = 'bold'
format = '[$all_status$ahead_behind]($style) '

[python]
style = 'fg:frost3 bold'
symbol = ''
format = '[$symbol]($style) '

[lua]
style = 'fg:frost2 bold'
symbol = ''
format = '[$symbol]($style) '

[rust]
style = 'fg:aurora_orange bold'
symbol = ''
format = '[$symbol]($style) '

[golang]
style = 'fg:frost1 bold'
symbol = "\U000f07d3"
format = '[$symbol]($style) '

[cmd_duration]
min_time = 500
style = 'fg:polar3'
format = '[$duration]($style) '

[palettes.nord]
polar0 = '#2E3440'
polar1 = '#3B4252'
polar2 = '#434C5E'
polar3 = '#4C566A'
snow0 = '#D8DEE9'
snow1 = '#E5E9F0'
snow2 = '#ECEFF4'
frost0 = '#8FBCBB'
frost1 = '#88C0D0'
frost2 = '#81A1C1'
frost3 = '#5E81AC'
aurora_red = '#BF616A'
aurora_orange = '#D08770'
aurora_yellow = '#EBCB8B'
aurora_green = '#A3BE8C'
aurora_purple = '#B48EAD'
