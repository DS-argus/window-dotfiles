format = """
$directory$git_branch$git_status$python$lua$rust$docker_context$cmd_duration
$character"""

add_newline = true
palette = 'tokyonight_night'

[directory]
style = 'bold fg:neon_cyan'
format = '[$path]($style) '
truncation_length = 3
truncation_symbol = '.../'
truncate_to_repo = false

[directory.substitutions]
'~' = '~'

[character]
success_symbol = '[❯](bold fg:neon_blue) '
error_symbol = '[❯](bold fg:neon_pink) '

[git_branch]
style = 'fg:neon_purple bold'
symbol = ''
format = '[$branch]($style) '

[git_status]
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?${count}'
modified = '!${count}'
conflicted = '=${count}'
staged = '+${count}'
stashed = '*${count}'
deleted = '-${count}'
style = 'fg:neon_orange bold'
format = '[$all_status$ahead_behind]($style) '

[python]
style = 'fg:neon_yellow bold'
symbol = ''
format = '[$symbol]($style) '

[lua]
style = 'fg:neon_cyan bold'
symbol = ''
format = '[$symbol]($style) '

[rust]
style = 'fg:neon_orange bold'
symbol = ''
format = '[$symbol]($style) '

[docker_context]
symbol = ''
style = 'fg:neon_cyan'
format = '[$symbol]($style) '
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[cmd_duration]
min_time = 500
style = 'fg:soft_gray'
format = '[$duration]($style) '

[palettes.tokyonight_night]
blue = '#7aa2f7'
cyan = '#7dcfff'
green = '#9ece6a'
orange = '#ff9e64'
purple = '#bb9af7'
red = '#f7768e'
yellow = '#e0af68'
gray = '#627e97'
white = '#cbe0f0'
black = '#011628'
neon_blue = '#82aaff'
neon_cyan = '#86e1fc'
neon_purple = '#c099ff'
neon_pink = '#ff7ab8'
neon_orange = '#ffb86c'
neon_yellow = '#ffd866'
soft_gray = '#7f96aa'
