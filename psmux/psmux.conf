# psmux config for native Windows + PowerShell
# psmux reads ~/.config/psmux/psmux.conf automatically.
# This theme is a static Nord-inspired port without Bash plugin loaders.

# ---------------------------------------------------------------------
# Key bindings
# ---------------------------------------------------------------------
set -g prefix M-a
unbind C-b
bind-key M-a send-prefix

unbind %
bind-key | split-window -h

unbind '"'
bind-key - split-window -v

bind-key r source-file ~/.config/psmux/psmux.conf

# Keep Alt-hjkl at the multiplexer level so leaving Neovim always works.
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

bind-key -r M-Left resize-pane -L 5
bind-key -r M-Down resize-pane -D 5
bind-key -r M-Up resize-pane -U 5
bind-key -r M-Right resize-pane -R 5

# Toggle zoom for the current pane.
bind-key m resize-pane -Z

# Rebalance all panes into an even tiled layout.
bind-key M select-layout tiled

# automatically name new window as 'window'
bind-key c new-window -n window

# ---------------------------------------------------------------------
# General behavior
# ---------------------------------------------------------------------
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g history-limit 5000
set -sg escape-time 10
set -g allow-predictions on
set -g prediction-dimming off
set -g automatic-rename off
set -g cursor-style block
set -g cursor-blink off

# ---------------------------------------------------------------------
# Copy mode
# ---------------------------------------------------------------------
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ---------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------
set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-resurrect'
# set -g @plugin 'psmux-plugins/psmux-theme-tokyonight'

# Theme intent. Static plugin.conf does not read every @tokyonight option;
# final local overrides below enforce the actual status bar.
# set -g @tokyonight-style 'storm'
# set -g @tokyonight-show-powerline 'on'

# Initialize PPM before local overrides.
run '~/.psmux/plugins/ppm/ppm.ps1'

# ---------------------------------------------------------------------
# Local Tokyo Night overrides
# ---------------------------------------------------------------------
# Storm palette, slant separators, user hidden, copy indicator enabled.
set -g status-style "bg=#24283b,fg=#c0caf5"
set -g status-left "#[bg=#7aa2f7,fg=#24283b,bold] #S #[fg=#7aa2f7,bg=#24283b] "
set -g status-left-length 30
set -g status-right "#{?client_prefix,#[fg=#ff9e64,bg=#24283b]#[bg=#ff9e64,fg=#24283b,bold] PREF #[fg=#ff9e64,bg=#24283b] ,}#{?pane_in_mode,#[fg=#bb9af7,bg=#24283b]#[bg=#bb9af7,fg=#24283b,bold] COPY #[fg=#bb9af7,bg=#24283b] ,}#[fg=#292e42,bg=#24283b]#[bg=#292e42,fg=#7dcfff] %H:%M:%S #[fg=#7aa2f7,bg=#292e42]#[bg=#7aa2f7,fg=#24283b,bold] %a %d-%b "
set -g status-right-length 80
set -g window-status-format "#[fg=#1f2335,bg=#24283b]#[fg=#565f89,bg=#1f2335] #I #W#{?window_flags, #{window_flags},} #[fg=#1f2335,bg=#24283b]"
set -g window-status-separator ""
set -g window-status-current-format "#[fg=#bb9af7,bg=#24283b]#[fg=#24283b,bg=#bb9af7,bold] #I #W#{?window_flags, #{window_flags},} #[fg=#bb9af7,bg=#24283b]"
set -g window-status-activity-style "fg=#e0af68,bg=#24283b"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-style "fg=#3b4261"
set -g message-style "bg=#1f2335,fg=#c0caf5"
set -g message-command-style "bg=#1f2335,fg=#c0caf5"
set -g mode-style "bg=#9d7cd8,fg=#24283b"
